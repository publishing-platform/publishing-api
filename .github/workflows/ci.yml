name: CI

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths-ignore:
      - ".git**"
  pull_request:

jobs:
  codeql-sast:
    name: CodeQL SAST scan
    uses: publishing-platform/publishing-platform-infrastructure/.github/workflows/codeql-analysis.yml@main
    permissions:
      security-events: write

  security-analysis:
    name: Security Analysis
    uses: publishing-platform/publishing-platform-infrastructure/.github/workflows/brakeman.yml@main
    secrets: inherit
    permissions:
      contents: read
      security-events: write
      actions: read

  lint-ruby:
    name: Lint Ruby
    uses: publishing-platform/publishing-platform-infrastructure/.github/workflows/rubocop.yml@main

  test-ruby:
    name: Test Ruby
    runs-on: ubuntu-latest
    steps:
      - name: Setup Postgres
        id: setup-postgres
        uses: publishing-platform/publishing-platform-infrastructure/.github/actions/setup-postgres@main

      - name: Setup Redis
        uses: publishing-platform/publishing-platform-infrastructure/.github/actions/setup-redis@main        

      - name: Checkout repository
        uses: actions/checkout@v4        

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Initialize database
        env:
          RAILS_ENV: test
          TEST_DATABASE_URL: ${{ steps.setup-postgres.outputs.db-url }}
        run: bundle exec rails db:setup     

      - name: Run RSpec
        env:
          RAILS_ENV: test
          TEST_DATABASE_URL: ${{ steps.setup-postgres.outputs.db-url }}
        run: bundle exec rake spec  

  check-schemas-build:
    name: Check content schemas are built
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Build content schemas
        run: bundle exec rake build_schemas

      - name: Check for uncommited changes
        run: |
          if git diff --exit-code; then
            echo "No uncommit changes detected."
          else
            echo "::error title=Uncommited changes to content schemas::If these are your changes, build the content schemas and commit the changes."
            exit 1
          fi